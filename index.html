<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title data-i18n="app_name">人脸识别考勤系统</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>👤</text></svg>">
</head>
<body>
    <!-- 顶部导航栏 -->
    <div class="top-bar">
        <div class="top-bar-left">
            <div class="logo" data-i18n="app_name">FaceAttendance</div>
            <div class="top-nav">
                <a href="index.html" class="active" data-i18n="nav_attendance">打卡</a>
                <a href="register.html" data-i18n="nav_register">录入</a>
            </div>
        </div>
        <div class="top-bar-right">
            <div class="language-switcher">
                <button class="lang-btn" onclick="setLanguage('fr')" data-lang="fr">FR</button>
                <button class="lang-btn" onclick="setLanguage('zh')" data-lang="zh">中文</button>
                <button class="lang-btn" onclick="setLanguage('en')" data-lang="en">EN</button>
            </div>
        </div>
    </div>

    <!-- 登录模态框 -->
    <div id="loginModal" class="modal-overlay" style="display: none;">
        <div class="modal">
            <div class="modal-icon">🔒</div>
            <h2 data-i18n="login_title">需要登录</h2>
            <p data-i18n="login_subtitle">请先登录后再进行打卡操作</p>
            <div class="modal-buttons">
                <button class="modal-btn modal-btn-primary" onclick="window.location.href='login.html'" data-i18n="login_button">去登录</button>
                <button class="modal-btn modal-btn-secondary" onclick="closeLoginModal()" data-i18n="cancel">取消</button>
            </div>
        </div>
    </div>

    <div class="header">
        <h1 data-i18n="attendance_title">人脸识别考勤系统</h1>
        <p data-i18n="attendance_subtitle">点击下方按钮进行人脸识别打卡</p>
    </div>

    <div class="container">
        <!-- 摄像头区域 -->
        <div class="video-container" style="display: none;">
            <video id="video" autoplay playsinline></video>
            <canvas id="overlay" class="overlay"></canvas>
        </div>

        <!-- 识别按钮 -->
        <button id="identifyBtn" class="btn-primary" onclick="identify()">
            <span>🔍</span>
            <span data-i18n="identify_button">开始人脸识别</span>
        </button>

        <!-- 员工信息卡片 -->
        <div id="userCard" class="user-card" style="display: none;">
            <div class="user-avatar-large" id="userInitial"></div>
            <div class="user-detail">
                <div class="user-name" id="userName"></div>
                <div class="user-type" id="userType"></div>
                <div class="user-stats">
                    <div class="stat">
                        <span class="stat-label" data-i18n="remaining_leave">剩余假期</span>
                        <span class="stat-value" id="userConges">0</span>
                        <span class="stat-unit" data-i18n="days">天</span>
                    </div>
                    <div class="stat">
                        <span class="stat-label" data-i18n="today_count">今日打卡</span>
                        <span class="stat-value" id="todayCount">0</span>
                        <span class="stat-unit" data-i18n="times">次</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- 打卡按钮 -->
        <div class="actions">
            <button id="checkInBtn" class="action-btn btn-check-in disabled" onclick="checkLoginThenRecord('check_in')">
                <span>✅</span>
                <span data-i18n="check_in">上班打卡</span>
                <span class="btn-time" id="checkInTime"></span>
            </button>
            <button id="checkOutBtn" class="action-btn btn-check-out disabled" onclick="checkLoginThenRecord('check_out')">
                <span>🏠</span>
                <span data-i18n="check_out">下班打卡</span>
                <span class="btn-time" id="checkOutTime"></span>
            </button>
            <button id="breakStartBtn" class="action-btn btn-break-start disabled" onclick="checkLoginThenRecord('break_start')">
                <span>☕</span>
                <span data-i18n="break_start">休息开始</span>
                <span class="btn-time" id="breakStartTime"></span>
            </button>
            <button id="breakEndBtn" class="action-btn btn-break-end disabled" onclick="checkLoginThenRecord('break_end')">
                <span>⚡</span>
                <span data-i18n="break_end">休息结束</span>
                <span class="btn-time" id="breakEndTime"></span>
            </button>
        </div>

        <!-- 自动关闭提示 -->
        <div id="autoCloseHint" class="hint" style="display: none;">
            ⏱️ <span data-i18n="auto_close">信息将在5秒后自动关闭</span>
        </div>

        <!-- 状态提示 -->
        <div id="status" class="status"></div>

        <!-- 今日记录 -->
        <div class="records">
            <h3 data-i18n="today_records">今日打卡记录</h3>
            <div id="recordsList" class="record-list">
                <div class="empty" data-i18n="no_records">暂无打卡记录</div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api@latest/dist/face-api.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="languages.js"></script>
    <script src="app.js"></script>
</body>
</html>
